version: '3.8'
services:
  db:
    image: postgres:17-alpine
    container_name: velocitydb_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: velocitydb
    ports:
      - "5432:5432"
    volumes:
      - velocitydb_data:/var/lib/postgresql/data

volumes:
  velocitydb_data:
