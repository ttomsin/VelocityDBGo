<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VelocityDBGo | Welcome</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        // Redirect to dashboard if already logged in
        if (localStorage.getItem("token")) {
            window.location.href = "/dashboard";
        }
    </script>
</head>
<body class="bg-gray-50 flex items-center justify-center h-screen font-sans">
    
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-gray-100">
        <div class="text-center mb-8">
            <div class="text-4xl text-indigo-600 mb-2"><i class="fa-solid fa-database"></i></div>
            <h1 class="text-3xl font-bold text-gray-800">VelocityDBGo</h1>
            <p class="text-gray-500 mt-2 text-sm">The no-stress BaaS for student projects</p>
        </div>

        <!-- Toggle Auth Mode -->
        <div class="flex mb-6 bg-gray-100 rounded-lg p-1">
            <button id="show-login" class="flex-1 py-2 text-sm font-medium rounded-md bg-white shadow-sm text-gray-800" onclick="switchTab('login')">Login</button>
            <button id="show-signup" class="flex-1 py-2 text-sm font-medium rounded-md text-gray-500 hover:text-gray-800" onclick="switchTab('signup')">Sign Up</button>
        </div>

        <form id="auth-form" onsubmit="handleAuth(event)">
            <input type="hidden" id="auth-mode" value="login">
            
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2" for="email">Email</label>
                <input class="w-full px-4 py-3 rounded-lg bg-gray-50 border border-gray-200 focus:outline-none focus:border-indigo-500 focus:bg-white focus:ring-1 focus:ring-indigo-500" 
                    id="email" type="email" placeholder="student@example.com" required>
            </div>
            
            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-bold mb-2" for="password">Password</label>
                <input class="w-full px-4 py-3 rounded-lg bg-gray-50 border border-gray-200 focus:outline-none focus:border-indigo-500 focus:bg-white focus:ring-1 focus:ring-indigo-500" 
                    id="password" type="password" placeholder="••••••••" required minlength="6">
            </div>

            <div id="error-box" class="hidden mb-4 p-3 bg-red-50 text-red-600 text-sm rounded-lg"></div>

            <button type="submit" id="submit-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 shadow-md">
                Login
            </button>
        </form>
    </div>

    <script src="/assets/app.js"></script>
</body>
</html>
